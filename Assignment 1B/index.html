<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
</head>

<body style="font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;">

    <div style="background: #fff; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        
        <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Register User</h2>

        <form id="userForm">
            
            <input type="text" id="name" placeholder="Full Name" required
                style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">

            <input type="email" id="email" placeholder="Email Address" required
                style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">

            <input type="password" id="password" placeholder="Password" required
                style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">

            <button type="submit"
                style="width: 100%; padding: 12px; background: #667eea; color: #fff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
                Register
            </button>
        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
